<div class="container">
  <div class="row w-100 mx-0 auth-page">
    <div class="col-md-8 col-xl-6 mx-auto">
      <div class="card">
        <div class="row">
          <div class="col-md-4 pe-md-0">
            <div class="auth-side-wrapper" [ngStyle]="{ 'background-image': 'url(images/img2.jpg)' }">
  
            </div>
          </div>
          <div class="col-md-8 ps-md-0">
            <div class="auth-form-wrapper px-4 py-5">
              <a routerLink="." class="nobleui-logo d-block mb-2">Kaurpan<span>App</span></a>
              <h5 class="text-secondary fw-normal mb-4">Welcome back! Log in to your account.</h5>
              <form class="forms-sample" [formGroup]="loginForm">
                <div class="mb-3">
                  <label for="exampleInputEmail1" class="form-label">Email address</label>
                  <input type="text" class="form-control" id="exampleInputEmail1" placeholder="Username" name="username" formControlName="username">
                </div>
                <div class="mb-3">
                  <label for="exampleInputPassword1" class="form-label">Password</label>
                  <input type="password" class="form-control" id="exampleInputPassword1" autocomplete="current-password" placeholder="Password" name="password" formControlName="password">
                </div>
                <div class="form-check mb-3">
                  <input type="checkbox" class="form-check-input" id="authCheck">
                  <label class="form-check-label" for="authCheck">
                    Remember me
                  </label>
                </div>
                <div>
                  <button 
                    class="btn btn-primary w-100"
                    (click)="onLoggedin()"
                    [disabled]="loading">

                    <span *ngIf="!loading">เข้าสู่ระบบ</span>
                    <span *ngIf="loading">กำลังเข้าสู่ระบบ...</span>

                  </button>

                  <div class="text-danger mt-2" *ngIf="errorMessage">
                    {{ errorMessage }}
                  </div>
                </div>
                <a routerLink="/auth/register" class="d-block mt-3 text-secondary">Not a user? Sign up</a>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
